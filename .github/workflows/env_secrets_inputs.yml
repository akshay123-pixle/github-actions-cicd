name: Demo CI Env Secrets

on:
  push:
  # workflow_dispatch:
  
env:
  Workflow_level_ENV: workflow level env
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      job_level_ENV: job level env
    steps:
      - name: Say Hello
        run: echo Hello, world from Second CI!

      - name: Install
        env:
          App_ENV: demo_new
          DB_PASSWORD : ${{secrets.DB_PASSWORD}}
        run: echo Environment ${App_ENV} using $DB_PASSWORD password, global level ${Workflow_level_ENV} and then job level is ${job_level_ENV}


      - name: Install
        run: |
          echo "Hello from CI pipeline" > demo.txt
          echo "File created successfully"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-demo_new
          path: .

