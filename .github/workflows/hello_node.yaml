name: Hello Node

on:
  push:
  #    path: ""
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "23"

      - name: Install Dependencies
        working-directory: docker/app1-hello/node
        run: npm ci # we use it in ci pipeline

      - name: Run Tests (If any)
        working-directory: docker/app1-hello/node
        run: npm test --if-present

  build-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code  # Download your repository files onto the runner machine
        uses: actions/checkout@v6


      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: docker/app1-hello/node
          push: true
          tags: |
            ${{secrets.DOCKER_USERNAME}}/hello-node-github:latest
            ${{secrets.DOCKER_USERNAME}}/hello-node-github:${{ github.sha }}