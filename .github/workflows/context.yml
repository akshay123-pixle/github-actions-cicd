name: Context Demo Workflow

on:
  push:

  workflow_dispatch:
    inputs:
      environment:
        description: "Choose environment"
        required: true
        default: "dev"

env:
  APP_ENV: productions
  APP_NAME: context-demo-app

jobs:
  demo-job:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Basic GitHub Context
      - name: Show GitHub Context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"

      # Step 2: Runner Context
      - name: Show Runner Info
        run: |
          echo "OS: ${{ runner.os }}"
          echo "Architecture: ${{ runner.arch }}"

      # Step 3: Environment Variables
      - name: Show Env Variables
        run: |
          echo "App Name: $APP_NAME"
          echo "App Env: $APP_ENV"

      # Step 4: Inputs (only for manual run)
      - name: Show Input Value
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Selected Environment: ${{ github.event.inputs.environment }}"


      # Step 5: Create Step Output
      - name: Generate Output
        id: step1
        run: |
          echo "message=Hello from step output" >> $GITHUB_OUTPUT

      # Step 6: Use Step Output
      - name: Read Step Output
        run: |
          echo "Output from previous step: ${{ steps.step1.outputs.message }}"

      # Step 7: Job Status Context
      - name: Show Job Status
        run: |
          echo "Job Status: ${{ job.status }}"