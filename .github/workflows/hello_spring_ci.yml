name: Hello Spring Boot App To Docker

on:
  push:
    # workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin" # See 'Supported distributions' for available options
          java-version: "25"

      - name: Build and test(Maven)
        working-directory: docker/app1-hello/springboot/hello-spring
        run: mvn -B clean verify

      - name: Upload Test Reports
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: docker/app1-hello/springboot/hello-spring/target/surefire-reports
  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"

      - name: Build JAR for Docker
        working-directory: docker/app1-hello/springboot/hello-spring
        run: mvn -B clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push to Docker Image
        uses: docker/build-push-action@v7
        with:
          context: docker/app1-hello/springboot/hello-spring
          push: true
          tags: |
              ${{secrets.DOCKER_USERNAME}}/helllo
