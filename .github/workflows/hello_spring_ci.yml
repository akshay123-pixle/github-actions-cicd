name: Hello Spring Boot App To Docker

on:
  push:
    # workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin" # See 'Supported distributions' for available options
          java-version: "25"

      - name: Build and test(Maven)
        working-directory: docker/app1-hello/springboot/hello-spring
        run: mvn -B clearn verify

      - name: Upload Test Reports
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: docker/app1-hello/springboot/hello-spring/target/surefire-reports
  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        run: echo Hello, world from Second CI!

      - name: Setup JDK
        run: echo ""

      - name: Build JAR for Docker
        run: echo ""

      - name: Login to DockerHub
        run: echo ""

      - name: Build and Push Docker Image
        run: echo ""
